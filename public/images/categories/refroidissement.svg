<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="16" fill="none"/>
  <!-- Radiateur — corps -->
  <rect x="110" y="90" width="180" height="180" rx="8" stroke="#1A1A1A" stroke-width="5" fill="#E8E0CE"/>
  <!-- Ailettes horizontales -->
  <line x1="120" y1="120" x2="280" y2="120" stroke="#3D3D3D" stroke-width="2"/>
  <line x1="120" y1="145" x2="280" y2="145" stroke="#3D3D3D" stroke-width="2"/>
  <line x1="120" y1="170" x2="280" y2="170" stroke="#3D3D3D" stroke-width="2"/>
  <line x1="120" y1="195" x2="280" y2="195" stroke="#3D3D3D" stroke-width="2"/>
  <line x1="120" y1="220" x2="280" y2="220" stroke="#3D3D3D" stroke-width="2"/>
  <line x1="120" y1="245" x2="280" y2="245" stroke="#3D3D3D" stroke-width="2"/>
  <!-- Tubes verticaux -->
  <line x1="155" y1="95" x2="155" y2="265" stroke="#1A1A1A" stroke-width="3"/>
  <line x1="200" y1="95" x2="200" y2="265" stroke="#1A1A1A" stroke-width="3"/>
  <line x1="245" y1="95" x2="245" y2="265" stroke="#1A1A1A" stroke-width="3"/>
  <!-- Bac supérieur -->
  <rect x="105" y="78" width="190" height="20" rx="6" stroke="#1A1A1A" stroke-width="3" fill="#3D3D3D"/>
  <!-- Bac inférieur -->
  <rect x="105" y="268" width="190" height="20" rx="6" stroke="#1A1A1A" stroke-width="3" fill="#3D3D3D"/>
  <!-- Durits entrée/sortie -->
  <path d="M140 78 Q140 55 120 55 L90 55" stroke="#7A9B76" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M260 288 Q260 310 280 310 L310 310" stroke="#7A9B76" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Gouttes (refroidissement) -->
  <ellipse cx="92" cy="65" rx="4" ry="6" fill="#7A9B76" opacity="0.5"/>
  <ellipse cx="308" cy="320" rx="4" ry="6" fill="#7A9B76" opacity="0.5"/>
  <!-- Label -->
  <text x="200" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#1A1A1A">REFROIDISSEMENT</text>
</svg>
