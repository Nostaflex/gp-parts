<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="16" fill="none"/>
  <!-- Filtre cylindrique — corps -->
  <rect x="135" y="85" width="130" height="200" rx="20" stroke="#1A1A1A" stroke-width="5" fill="#F5F1E8"/>
  <!-- Bande centrale -->
  <rect x="145" y="120" width="110" height="130" rx="8" fill="#E8E0CE" stroke="#3D3D3D" stroke-width="2"/>
  <!-- Plis du filtre (accordéon) -->
  <line x1="155" y1="140" x2="245" y2="140" stroke="#D4A24C" stroke-width="2" opacity="0.7"/>
  <line x1="155" y1="155" x2="245" y2="155" stroke="#D4A24C" stroke-width="2" opacity="0.7"/>
  <line x1="155" y1="170" x2="245" y2="170" stroke="#D4A24C" stroke-width="2" opacity="0.7"/>
  <line x1="155" y1="185" x2="245" y2="185" stroke="#D4A24C" stroke-width="2" opacity="0.7"/>
  <line x1="155" y1="200" x2="245" y2="200" stroke="#D4A24C" stroke-width="2" opacity="0.7"/>
  <line x1="155" y1="215" x2="245" y2="215" stroke="#D4A24C" stroke-width="2" opacity="0.7"/>
  <line x1="155" y1="230" x2="245" y2="230" stroke="#D4A24C" stroke-width="2" opacity="0.7"/>
  <!-- Joint supérieur -->
  <ellipse cx="200" cy="90" rx="65" ry="12" stroke="#1A1A1A" stroke-width="3" fill="#3D3D3D"/>
  <!-- Joint inférieur -->
  <ellipse cx="200" cy="280" rx="65" ry="12" stroke="#1A1A1A" stroke-width="3" fill="#3D3D3D"/>
  <!-- Filetage en bas -->
  <rect x="185" y="288" width="30" height="15" rx="4" fill="#1A1A1A"/>
  <!-- Label -->
  <text x="200" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#1A1A1A">FILTRES</text>
</svg>
