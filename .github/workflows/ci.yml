name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs précédents si un nouveau commit arrive sur la même branche/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Format · Typecheck · Tests · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=critical || true
        # Note: --audit-level=critical pour ne pas bloquer sur des vulns transitives
        # sans fix disponible. Passer à --audit-level=high quand les deps upstream corrigent.

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check "**/*.{ts,tsx,json,css,md}" --ignore-path .prettierignore

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npx vitest run --coverage
        env:
          CI: 'true'

      - name: Check coverage thresholds
        run: |
          echo "Coverage thresholds: lines 60%, functions 60%, branches 50%"
          echo "Thresholds are enforced by vitest.config.ts — the previous step fails if not met."

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  e2e:
    name: Playwright · E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: 'true'
          NEXT_TELEMETRY_DISABLED: '1'
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
