name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs précédents si un nouveau commit arrive sur la même branche/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Évite d'échouer sur des warnings Next/Telemetry en CI.
          NEXT_TELEMETRY_DISABLED: '1'
